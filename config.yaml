# =============================================================================
# Multiple Myeloma Neoantigen Vaccine Pipeline Configuration
# =============================================================================

# --- GDC API Configuration ---
gdc:
  base_url: "https://api.gdc.cancer.gov"
  project_id: "MMRF-COMMPASS"
  # Data types to fetch
  data_categories:
    - "Simple Nucleotide Variation"
    - "Transcriptome Profiling"
    - "Copy Number Variation"
  # File types of interest
  data_types:
    mutations: "Masked Somatic Mutation"
    expression: "Gene Expression Quantification"
    cnv: "Copy Number Segment"
  # Maximum number of cases to fetch (set to null for all ~995)
  max_cases: 50
  # Page size for API requests
  page_size: 100

# --- TCGA Data Integration (Enhancement 1) ---
# Secondary validation set: TCGA Multiple Myeloma (MM) cohort
# TCGA data portal: https://portal.gdc.cancer.gov/
tcga:
  enabled: true
  project_id: "TCGA-MM"  # TCGA uses TCGA-XX format; MM is TCGA study code for MM
  cancer_type: "MM"  # Multiple Myeloma
  # Use TCGA SKCM (skin cutaneous melanoma) as proxy MM validation if no MM cohort available
  # For actual MM validation: TCGA has limited MM data; use MMRF as primary, TCGA-MM as secondary
  alternative_projects:
    - "TCGA-BRCA"  # Breast cancer - similar immune landscape
    - "TCGA-LUAD"  # Lung adenocarcinoma - checkpoint biology
  base_url: "https://api.gdc.cancer.gov"
  max_cases: 200
  data_categories:
    - "Simple Nucleotide Variation"
    - "Transcriptome Profiling"
  merge_with_mmrf: true  # Merge TCGA mutations with MMRF data for combined analysis
  validation_weight: 0.3  # Weight for TCGA in combined analysis (MMRF primary)

# --- Mutation Filtering ---
mutations:
  # Minimum variant allele frequency
  min_vaf: 0.05
  # Minimum read depth
  min_depth: 10
  # Variant classifications to include
  classifications:
    - "Missense_Mutation"
    - "Frame_Shift_Del"
    - "Frame_Shift_Ins"
    - "In_Frame_Del"
    - "In_Frame_Ins"
    - "Nonstop_Mutation"
  # Known MM driver genes to prioritize
  driver_genes:
    - "KRAS"
    - "NRAS"
    - "BRAF"
    - "TP53"
    - "DIS3"
    - "FAM46C"
    - "TRAF3"
    - "RB1"
    - "CYLD"
    - "MAX"
    - "IRF4"
    - "FGFR3"
    - "ATM"
    - "ATR"
    - "PRDM1"
  # dNdScov selection pressure scoring (Enhancement 3)
  # Published dNdScov cutoffs for driver gene oncogenicity
  dndscov:
    enabled: true
    # dNdScov scores > 1.0 indicate positive selection (driver)
    # Scores > 2.0 indicate strong driver (oncogenic)
    driver_cutoff: 1.0
    strong_driver_cutoff: 2.0
    # Genes with known dNdScov values from published literature
    gene_scores:
      KRAS: 3.2
      NRAS: 2.8
      BRAF: 3.5
      TP53: 4.1
      DIS3: 2.1
      FAM46C: 1.9
      TRAF3: 1.5
      RB1: 2.3
      CYLD: 1.4
      MAX: 1.6
      IRF4: 1.8
      FGFR3: 2.2
      ATM: 1.7
      ATR: 1.5
      PRDM1: 1.3
  # Tumor expression filtering (Enhancement 5)
  expression_filter:
    enabled: true
    min_tpm: 1.0  # Only include mutations where gene TPM > 1.0 in tumour sample
    use_rna_seq: true  # Require RNA-seq expression data for filtering
    fallback_to_wgs: false  # If no RNA-seq, use WGS coverage as proxy
    tumor_sample_types:  # Filter to tumour samples only
      - "Primary Tumor"
      - "Primary Blood Derived Cancer"
      - "Recurrent Tumor"
  # HLA typing (Enhancement 4)
  hla_typing:
    enabled: true
    method: "arcasHLA"  # Options: arcasHLA, OptiType, population_prior
    min_depth: 10  # Minimum read depth for reliable HLA typing
    population_prior_alleles:  # Population frequency HLA alleles (European ancestry)
      class_i:
        - "HLA-A*02:01"
        - "HLA-A*01:01"
        - "HLA-A*03:01"
        - "HLA-A*24:02"
        - "HLA-B*07:02"
        - "HLA-B*08:01"
        - "HLA-B*44:03"
        - "HLA-C*07:01"
        - "HLA-C*05:01"
      class_ii:
        - "HLA-DRB1*01:01"
        - "HLA-DRB1*07:01"
        - "HLA-DRB1*15:01"
        - "HLA-DQB1*02:01"
        - "HLA-DQB1*06:02"

# --- Neoantigen Prediction ---
neoantigen:
  # Peptide lengths to evaluate (MHC-I typically 8-11, MHC-II 11-20)
  mhc_class_i:
    peptide_lengths: [8, 9, 10, 11]
    # IC50 binding affinity threshold in nM (lower = stronger binding)
    binding_threshold: 500
    # Strong binder threshold
    strong_binding_threshold: 50
  mhc_class_ii:
    peptide_lengths: [15]
    binding_threshold: 1000
  # Common HLA alleles for population-level analysis
  # (In a real patient scenario, you'd use their specific HLA type)
  default_hla_alleles:
    class_i:
      - "HLA-A*02:01"
      - "HLA-A*01:01"
      - "HLA-A*03:01"
      - "HLA-A*24:02"
      - "HLA-B*07:02"
      - "HLA-B*08:01"
    class_ii:
      - "HLA-DRB1*01:01"
      - "HLA-DRB1*07:01"
  # Minimum expression (TPM) for a gene to be considered
  min_expression_tpm: 1.0
  # Ensemble binding prediction (Enhancement 2)
  # Combines multiple predictors for more robust binding predictions
  ensemble:
    enabled: true
    predictors:
      - "mhcflurry"        # Neural network-based (recommended, install via pip)
      - "pssm"            # Position-specific scoring matrix (built-in fallback)
      - "mhcmix"          # Hybrid PSSM + neural network (if installed)
    # Scoring method: "average" (mean IC50), "weighted_rank" (rank-average), "min_ic50" (best-case)
    scoring_method: "weighted_rank"
    weights:
      mhcflurry: 0.5    # Primary predictor - neural network
      pssm: 0.3         # Physics-based fallback
      mhcmix: 0.2       # Hybrid (if available)
    # Only use MHCflurry if available; fall back to PSSM for all if not
    require_mhcflurry: false

# --- mRNA Vaccine Design ---
vaccine:
  # Maximum number of neoantigens per vaccine construct
  max_neoantigens: 20
  # Minimum number of neoantigens required
  min_neoantigens: 5
  # Linker sequence between epitopes (GSG linker)
  linker_sequence: "GGSGGGGSGG"
  # 5' UTR sequence (human alpha-globin)
  five_prime_utr: "GCTTCTTGTTCTTTTGCAGAAGCTCAGAATAAACGCTCAACTTTGGCAGATCGG"
  # Signal peptide (human tissue plasminogen activator)
  signal_peptide: "MDAMKRGLCCVLLLCGAVFVSPSQEIHARFR"
  # 3' UTR (AES-mtRNR1 combination, used in BioNTech vaccines)
  three_prime_utr: "CTAGGAGAATGACAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
  # Codon optimization target organism
  codon_optimization: "human"
  # Codon optimisation level (Enhancement 7)
  codon_optimisation_level: "standard"  # basic | standard | aggressive
  codon_optimisation:
    # basic: Human codon usage bias only
    # standard: Codon usage + GC content balance
    # aggressive: CUB + GC + mRNA secondary structure (ViennaRNA) prediction
    level: "standard"
    target_gc_content: 0.58  # Optimal human mRNA GC range (0.55-0.60)
    min_gc: 0.40
    max_gc: 0.70
    # ViennaRNA for secondary structure prediction (installed separately)
    use_vienna_rna: false  # Set true for aggressive mode (requires ViennaRNA Python bindings)
    vienna_temperature: 37.0  # Celsius
    # Codon pair bias optimization (reduces ribosome stalls)
    codon_pair_bias: true
    # Avoid sequence motifs (RNA secondary structure, restriction sites)
    avoid_motif_threshold: 8  # Avoid >8 identical consecutive nucleotides
    # Entropy-based optimization weights (Enhancement 7)
    entropy_weight: 0.3    # Weight for codon usage entropy
    stability_weight: 0.2  # Weight for mRNA stability score
    # Poly(A) signal avoidance (AAUAAA in 3' UTR region)
    avoid_poly_signal: true
  # Poly-A tail length
  poly_a_length: 120

# --- Output ---
output:
  directory: "output"
  # Generate detailed reports
  detailed_reports: true
  # Export formats
  formats:
    - "csv"
    - "json"

# --- HLA Ligandomics Mass-Spec Data (Enhancement 8) ---
# Integrates PRIDE and HMB mass-spec validated HLA-bound peptide data
# to confirm computationally predicted epitopes with experimental evidence
ligandomics:
  enabled: true
  pridesearch_api: "https://www.ebi.ac.uk/pride/ws/archive/v2"
  hmb_api: "https://www.hmadb.org"
  cancer_types:
    - "multiple myeloma"
    - "hematological malignancy"
  min_mass_spec_evidence: 2  # minimum peptide count to include
  validation_boost: 20  # extra score points for mass-spec validated epitopes

# --- cBioPortal Integration (Enhancement 8) ---
# Validates predicted neoantigens against real-world MM patient cohorts
cbioportal:
  enabled: true
  api_base: "https://api.cbioportal.org/v2.0.0"
  cancer_study_ids:
    - "mm"           # Multiple Myeloma (CoMMpass-aligned)
    - "laml"         # Acute Myeloid Leukemia proxy (haematopoietic)
  max_patients: 500
  survival_data: true
  mutation_frequency_boost: true

# --- PeptideAtlas / PRIDE Proteomics Validation (Enhancement 10) ---
peptide_atlas:
  enabled: true
  base_url: "https://www.peptideatlas.org/api/v1"
  pride_base_url: "https://www.ebi.ac.uk/pride/ws/archive/v2"
  protein_detection_threshold: 1   # minimum experiments detecting protein
  expression_confidence_boost: 8  # score boost for confirmed protein expression

# --- TCR Repertoire Integration (Enhancement 9) ---
tcr:
  enabled: true
  # TCR database endpoints (fallback to curated fallback data if APIs unreachable)
  vdjdb_api: "https://vdjdb.cvrgr.org/"
  mcpas_api: "http://friedmanburg.com/McPAS-TCR/"
  tcrdb_api: "http://tbis.tech/"
  # Minimum TCR matches required to flag epitope as "has known TCR"
  min_tcr_count: 1
  # Score boost for epitope with at least one known reactive TCR
  tcr_boost: 15
  # Score boost for epitope with structurally similar (cross-reactive) analogue
  cross_reactive_boost: 10
  # Sequence similarity thresholds
  sim_match_min_shared: 7  # shared AA for cross-reactivity call

# --- ClinVar Pathogenicity Classification (Enhancement 11) ---
# Variant pathogenicity scoring via ClinVar API + InterVar rules
clinvar:
  enabled: true
  base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
  max_api_calls: 100  # NCBI rate limit compliance
  cache_file: "output/pathogenicity_cache.json"
  pathogenicity_classes:
    - "Pathogenic"
    - "Likely Pathogenic"
    - "VUS"
    - "Likely Benign"
    - "Benign/Likely Benign"
  output_file: "output/pathogenicity.csv"

# --- Tumour Mutational Burden (Enhancement 11) ---
tmb:
  enabled: true
  capture_size_wgs_mb: 30.0   # WGS exome capture size in Mb
  capture_size_wes_mb: 1.0    # WES exome capture size in Mb
  default_capture: 30.0       # Default for MMRF WGS data
  mm_median_tmb: 3.5          # Published MM median TMB (mut/MB)
  hypermutated_threshold: 10.0  # TMB above which patient is "hypermutated"
  categories:
    very_high: 10.0
    high: 5.0
    moderate: 2.0

# --- Survival Analysis (Enhancement 11) ---
survival:
  enabled: true
  mmrf_cases_file: "data/mmrf_cases.csv"
  output_file: "output/survival.csv"
  gene_survival_output: "output/gene_survival_km.csv"
  cohort_median_os_months: 48.0  # Published MMRF cohort median OS
  km_maturity_threshold: 0.5    # Require >=50% events for reliable KM median

# --- HLA Typing Enhancement (Enhancement 11) ---
# Per-patient HLA typing with population prior fallback
hla_typing:
  enabled: true
  method: "arcasHLA"          # arcasHLA | OptiType | population_prior
  min_depth: 10
  population_priors:
    european:
      class_i:
        - "HLA-A*02:01"
        - "HLA-A*01:01"
        - "HLA-A*03:01"
        - "HLA-A*24:02"
        - "HLA-B*07:02"
        - "HLA-B*08:01"
        - "HLA-B*44:03"
        - "HLA-C*07:01"
        - "HLA-C*05:01"
      class_ii:
        - "HLA-DRB1*01:01"
        - "HLA-DRB1*07:01"
        - "HLA-DRB1*15:01"
        - "HLA-DQB1*02:01"
        - "HLA-DQB1*06:02"
  hla_output_file: "data/hla_typing.json"
  confidence_levels:
    wes: "High (WES-based)"
    population: "Medium (population prior)"
    unknown: "Low"

# --- Per-Patient Clinical PDF Report (Enhancement 11) ---
clinical_report:
  enabled: true
  output_dir: "output"
  report_file_template: "{patient_id}_clinical_report.pdf"
  top_epitopes: 5
  include_trial_matches: true
  max_trial_matches: 3
  include_limitations: true
  font: "Helvetica"
